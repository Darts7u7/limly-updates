name: Release

# Triggered by pushing a version tag to this repo:
#   git tag v1.3.11 && git push origin v1.3.11
# Or via the "Run workflow" button (workflow_dispatch).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (e.g., v1.3.11). Must already exist or will be created."
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout LimlyPe (private source)
        uses: actions/checkout@v4
        with:
          repository: Darts7u7/LimlyPe
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: main
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure Rust target is installed
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject release version into Tauri config
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VERSION="${TAG#v}"
          CONF=apps/desktop/src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '. + {version: $v}' "$CONF" > "$CONF.tmp" && mv "$CONF.tmp" "$CONF"
          echo "Injected version: $VERSION"
          jq '.version' "$CONF"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: false
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          VITE_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          VITE_APP_URL: "https://limly.io"
          VITE_API_URL: "https://api.limly.io"
        with:
          projectPath: ./apps/desktop
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: "Limly ${{ steps.tag.outputs.value }}"
          releaseBody: "Nueva versión disponible. La actualización se instalará automáticamente."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          tauriScript: pnpm tauri
          args: ${{ matrix.args }} --config src-tauri/tauri.conf.stable.json
